name: cloud
on:
  push:

jobs:
  object:
    runs-on: ubuntu-latest
    environment: IBM Cloud
    env:
      API_KEY: ${{secrets.API_KEY}}
    steps:
      - uses: actions/checkout@main
      - uses: davidkhala/uv-buildpack@main
        with:
          working-directory: cloud/py
          tests: cloud/py/tests
          test-entry-point: pytest
          extras: object